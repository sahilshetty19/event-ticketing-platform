server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Runtime config and the app shell must never be cached.
    location = /env.js {
        add_header Cache-Control "no-store";
    }
    location = /index.html {
        add_header Cache-Control "no-store";
    }

    # Client-side routing: serve index.html for any unknown path.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
