# A Secret holds SENSITIVE config (passwords, connection strings). It is namespaced and
# injected into pods just like a ConfigMap, but is meant to be created from values that are
# NOT committed to git.
#
# This file is an EXAMPLE with placeholder values. Do one of the following for real use:
#
#   Option A — copy & edit (the copy, secret.yaml, is gitignored):
#     cp k8s/secret.example.yaml k8s/secret.yaml
#     # edit the values in k8s/secret.yaml, then:
#     kubectl apply -f k8s/secret.yaml
#
#   Option B — create imperatively from literals (nothing written to disk):
#     kubectl create secret generic et-secrets -n event-ticketing \
#       --from-literal=MSSQL_SA_PASSWORD='Str0ng_Passw0rd!' \
#       --from-literal=RabbitMq__Password='Event_Passw0rd!' \
#       --from-literal=ConnectionStrings__CatalogDb='Server=sqlserver,1433;Database=CatalogDb;User Id=sa;Password=Str0ng_Passw0rd!;TrustServerCertificate=True' \
#       --from-literal=ConnectionStrings__BookingDb='Server=sqlserver,1433;Database=BookingDb;User Id=sa;Password=Str0ng_Passw0rd!;TrustServerCertificate=True' \
#       --from-literal=ConnectionStrings__PaymentDb='Server=sqlserver,1433;Database=PaymentDb;User Id=sa;Password=Str0ng_Passw0rd!;TrustServerCertificate=True' \
#       --from-literal=ConnectionStrings__NotificationDb='Server=sqlserver,1433;Database=NotificationDb;User Id=sa;Password=Str0ng_Passw0rd!;TrustServerCertificate=True'
#
# NOTE: the SA password must be identical in MSSQL_SA_PASSWORD and in every connection string.
apiVersion: v1
kind: Secret
metadata:
  name: et-secrets
  namespace: event-ticketing
  labels:
    app.kubernetes.io/part-of: event-ticketing
type: Opaque
# stringData lets you write plaintext; Kubernetes base64-encodes it on apply.
stringData:
  MSSQL_SA_PASSWORD: "REPLACE_WITH_STRONG_SA_PASSWORD"
  RabbitMq__Password: "REPLACE_WITH_RABBITMQ_PASSWORD"
  ConnectionStrings__CatalogDb: "Server=sqlserver,1433;Database=CatalogDb;User Id=sa;Password=REPLACE_WITH_STRONG_SA_PASSWORD;TrustServerCertificate=True"
  ConnectionStrings__BookingDb: "Server=sqlserver,1433;Database=BookingDb;User Id=sa;Password=REPLACE_WITH_STRONG_SA_PASSWORD;TrustServerCertificate=True"
  ConnectionStrings__PaymentDb: "Server=sqlserver,1433;Database=PaymentDb;User Id=sa;Password=REPLACE_WITH_STRONG_SA_PASSWORD;TrustServerCertificate=True"
  ConnectionStrings__NotificationDb: "Server=sqlserver,1433;Database=NotificationDb;User Id=sa;Password=REPLACE_WITH_STRONG_SA_PASSWORD;TrustServerCertificate=True"
