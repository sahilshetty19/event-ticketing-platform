# Redis as a Deployment + PersistentVolumeClaim. A Deployment manages a replica of a stateless-ish
# pod; the PVC gives it durable storage for the append-only file so data survives a restart.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data
  namespace: event-ticketing
  labels: { app: redis, app.kubernetes.io/part-of: event-ticketing }
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: event-ticketing
  labels: { app: redis, app.kubernetes.io/part-of: event-ticketing }
spec:
  selector: { app: redis }
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: event-ticketing
  labels: { app: redis, app.kubernetes.io/part-of: event-ticketing }
spec:
  replicas: 1
  strategy: { type: Recreate }   # single RWO volume: don't run two pods at once
  selector:
    matchLabels: { app: redis }
  template:
    metadata:
      labels: { app: redis, app.kubernetes.io/part-of: event-ticketing }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          args: ["redis-server", "--appendonly", "yes"]
          ports:
            - containerPort: 6379
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "250m", memory: "256Mi" }
          volumeMounts:
            - name: redis-data
              mountPath: /data
          readinessProbe:
            exec: { command: ["redis-cli", "ping"] }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket: { port: 6379 }
            initialDelaySeconds: 10
            periodSeconds: 20
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: redis-data
