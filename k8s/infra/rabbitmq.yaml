# RabbitMQ as a StatefulSet (durable broker state on a dedicated PV). The Service exposes the
# AMQP port (5672) used by the services and the management UI (15672).
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: event-ticketing
  labels: { app: rabbitmq, app.kubernetes.io/part-of: event-ticketing }
spec:
  clusterIP: None          # headless governing Service for the StatefulSet
  selector: { app: rabbitmq }
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rabbitmq
  namespace: event-ticketing
  labels: { app: rabbitmq, app.kubernetes.io/part-of: event-ticketing }
spec:
  serviceName: rabbitmq
  replicas: 1
  selector:
    matchLabels: { app: rabbitmq }
  template:
    metadata:
      labels: { app: rabbitmq, app.kubernetes.io/part-of: event-ticketing }
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3-management-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - { name: amqp, containerPort: 5672 }
            - { name: management, containerPort: 15672 }
          env:
            # Reuse the same credentials the apps use (username from ConfigMap, password from Secret).
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                configMapKeyRef: { name: et-config, key: RabbitMq__Username }
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef: { name: et-secrets, key: RabbitMq__Password }
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
          volumeMounts:
            - name: rabbitmq-data
              mountPath: /var/lib/rabbitmq
          readinessProbe:
            exec: { command: ["rabbitmq-diagnostics", "-q", "ping"] }
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 10
          livenessProbe:
            exec: { command: ["rabbitmq-diagnostics", "-q", "ping"] }
            initialDelaySeconds: 45
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 6
  volumeClaimTemplates:
    - metadata:
        name: rabbitmq-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
