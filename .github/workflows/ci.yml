name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  DOTNET_VERSION: "9.0.x"
  DOTNET_NOLOGO: "true"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore EventTicketing.sln

      - name: Build
        run: dotnet build EventTicketing.sln --no-restore -c Release

      - name: Test
        # All integration tests use the EF in-memory provider and the MassTransit in-memory
        # test harness, so no SQL Server / Redis / RabbitMQ is needed in CI.
        run: dotnet test EventTicketing.sln --no-build -c Release --verbosity normal

  docker-build:
    name: Docker Build (${{ matrix.service.name }})
    runs-on: ubuntu-latest
    needs: build-and-test
    strategy:
      fail-fast: false
      matrix:
        service:
          - { name: catalog-api,      dockerfile: src/Services/Catalog/Catalog.API/Dockerfile }
          - { name: booking-api,      dockerfile: src/Services/Booking/Booking.API/Dockerfile }
          - { name: payment-api,      dockerfile: src/Services/Payment/Payment.API/Dockerfile }
          - { name: notification-api, dockerfile: src/Services/Notification/Notification.API/Dockerfile }
          - { name: gateway,          dockerfile: src/ApiGateway/ApiGateway/Dockerfile }
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (${{ matrix.service.name }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: false
          tags: eventticketing/${{ matrix.service.name }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
